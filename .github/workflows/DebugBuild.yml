name: DebugBuild
on:
  push:
    branches:
      - master
env:
  # リポジトリのルートディレクトリを基点としたソリューションファイルのパス
  SOLUTION_FILE_PATH: project/DirectXGame.sln
  # Visual Studio の構成(Debug / Development / Release)
  CONFIGURATION: Debug
jobs:
  build:
    # 最新の VS2026 環境を使用
    runs-on: windows-2025-vs2026

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64
      - name: Build
        run: |
          msbuild ${{env.SOLUTION_FILE_PATH}} /p:Platform="x64" /p:Configuration=${{env.CONFIGURATION}}